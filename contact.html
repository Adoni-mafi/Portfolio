<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styel.css">
</head>

<body>

<div class="container my-5">

  <!-- Title -->
  <h1 class="text-center mb-4 fw-bold">Contact Me</h1>
  <p class="text-center text-muted mb-5">
    Let’s connect and build something great 🚀
  </p>

  <div class="row g-4">

    <!-- CONTACT FORM -->
    <div class="col-md-6">

      <div class="card p-4 shadow border-0 contact-card">

        <h4 class="mb-3">Send Message</h4>

        <form>

          <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" class="form-control" placeholder="Your name">
          </div>

          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Your email">
          </div>

          <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="5" placeholder="Write your message..."></textarea>
          </div>

          <button class="btn btn-primary w-100 glow-btn">Send Message</button>

        </form>

      </div>

    </div>

    <!-- SOCIAL LINKS -->
    <div class="col-md-6">

      <div class="card p-4 shadow border-0 contact-card h-100">

        <h4 class="mb-3">Connect With Me</h4>

        <p class="text-muted">
          You can also reach me through these platforms:
        </p>

        <div class="d-grid gap-3">

          <a href="https://github.com/Adoni-mafi" class="btn btn-dark glow-btn">
            🐙 GitHub
          </a>

          <a href="https://t.me/Adoni_maf" class="btn btn-primary glow-btn">
            💬 Telegram
          </a>

          <a href="mailto:aronamre01@gmail.com" class="btn btn-success glow-btn">
            📧 Email Me
          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
