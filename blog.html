<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="styel.css">
</head>
<body>
  <div class="container my-5">

  <h2 class="text-center mb-4 fw-bold">My Journey</h2>
  <p class="text-center text-muted mb-5">
    Photos, videos and moments from my learning path
  </p>

  <div class="row g-4">

    <!-- ITEM 1 (IMAGE) -->
    <div class="col-md-4">
      <div class="card shadow border-0 blog-card">

        <img src="yourphoto1.jpg" class="card-img-top" alt="Blog image">

        <div class="card-body">
          <p class="card-text">
            Started learning programming and building my first projects.
          </p>
        </div>

      </div>
    </div>

    <!-- ITEM 2 (VIDEO) -->
    <div class="col-md-4">
      <div class="card shadow border-0 blog-card">

        <div class="ratio ratio-16x9">
          <iframe src="https://www.youtube.com/embed/VIDEO_ID"
                  title="YouTube video"
                  allowfullscreen>
          </iframe>
        </div>

        <div class="card-body">
          <p class="card-text">
            My first coding project demo video.
          </p>
        </div>

      </div>
    </div>

    <!-- ITEM 3 (IMAGE) -->
    <div class="col-md-4">
      <div class="card shadow border-0 blog-card">

        <img src="yourphoto2.jpg" class="card-img-top" alt="Blog image">

        <div class="card-body">
          <p class="card-text">
            Working on assignments at ASTU.
          </p>
        </div>

      </div>
    </div>

  </div>
</div>  
<script src="script.js"></script>
</body>
</html>
